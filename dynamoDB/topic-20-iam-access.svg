<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">20. IAM &amp; Fine-Grained Access Control</text>
  
  <!-- Identity -->
  <rect x="50" y="80" width="180" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">User (ID: 101)</text>

  <!-- IAM Policy Evaluator -->
  <path d="M400,80 L550,150 L400,220 L250,150 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
  <text x="400" y="150" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Policy Evaluator</text>
  <line x1="230" y1="110" x2="300" y2="140" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row Level Security -->
  <rect x="40" y="280" width="350" height="200" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="215" y="310" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Row Level (RLS)</text>
  <text x="215" y="340" text-anchor="middle" font-family="Arial" font-size="11">LeadingKeys: ["${aws:userid}"]</text>
  <text x="215" y="370" text-anchor="middle" font-family="Arial" font-size="11">Ensures PK == Logged-in UserID</text>
  <line x1="400" y1="220" x2="300" y2="280" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Attribute Level Security -->
  <rect x="410" y="280" width="350" height="200" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="585" y="310" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Attribute Level (ALS)</text>
  <text x="585" y="340" text-anchor="middle" font-family="Arial" font-size="11">Attributes: ["Name", "Email"]</text>
  <text x="585" y="370" text-anchor="middle" font-family="Arial" font-size="11">Denies "CreditCardNumber"</text>
  <line x1="400" y1="220" x2="500" y2="280" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Table Container -->
  <rect x="40" y="550" width="720" height="200" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="570" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Result on Storage</text>

  <rect x="250" y="600" width="300" height="100" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="635" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Item { PK: 101 }</text>
  <text x="400" y="655" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">✅ Row Matches Principal</text>
  <text x="400" y="675" text-anchor="middle" font-family="Arial" font-size="11" fill="#b91c1c">🚫 CC_Num Hidden by ALS</text>

  <!-- Legend -->
  <rect x="100" y="770" width="600" height="60" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="795" font-family="Arial" font-size="12" font-weight="bold">Security Mindset:</text>
  <text x="120" y="815" font-family="Arial" font-size="11">Security is tied to Data Modeling. LeadingKeys ONLY works on Partition Key.</text>
</svg>