<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">20. IAM &amp; Access Control</text>

  <!-- IAM Identity -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="107" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">User / Role</text>
  <text x="400" y="124" text-anchor="middle" font-family="Arial" font-size="11">(Authenticated Identity)</text>

  <!-- IAM Policy Evaluation -->
  <path d="M400,380 L580,450 L400,520 L220,390 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="450" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">IAM Policy Evaluator</text>
  <text x="400" y="465" text-anchor="middle" font-family="Arial" font-size="11">LeadingKeys / Attributes Check</text>
  <line x1="400" y1="140" x2="400" y2="400" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row Level Security -->
  <rect x="60" y="570" width="200" height="80" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="160" y="605" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Row-Level Security</text>
  <text x="160" y="622" text-anchor="middle" font-family="Arial" font-size="10">LeadingKeys = UserID</text>
  <text x="160" y="637" text-anchor="middle" font-family="Arial" font-size="10">Only own rows visible</text>

  <!-- Attribute Level Security -->
  <rect x="540" y="570" width="200" height="80" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="640" y="605" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Attribute-Level Security</text>
  <text x="640" y="622" text-anchor="middle" font-family="Arial" font-size="10">Restrict specific fields</text>
  <text x="640" y="637" text-anchor="middle" font-family="Arial" font-size="10">e.g., hide CreditCardNumber</text>

  <line x1="350" y1="540" x2="200" y2="570" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="540" x2="600" y2="570" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Resource Policy -->
  <rect x="270" y="700" width="260" height="70" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="400" y="730" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Resource-Based Policy</text>
  <text x="400" y="748" text-anchor="middle" font-family="Arial" font-size="10">Cross-Account Access (Account B reads Account A)</text>
  <line x1="160" y1="650" x2="340" y2="700" stroke="#666" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="640" y1="650" x2="460" y2="700" stroke="#666" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="80" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">Access Layers:</text>
  <text x="590" y="385" font-family="Arial" font-size="10">- Identity (IAM Role)</text>
  <text x="590" y="400" font-family="Arial" font-size="10">- Row-Level (PK match)</text>
  <text x="590" y="415" font-family="Arial" font-size="10">- Attribute (field filter)</text>
</svg>
