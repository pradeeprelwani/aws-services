<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">17. Secondary Index Comparison: LSI vs GSI</text>
  
  <!-- Base Table -->
  <rect x="300" y="80" width="200" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Main Table</text>
  <text x="400" y="135" text-anchor="middle" font-family="Arial" font-size="11">PK: userId | SK: orderDate</text>

  <!-- LSI Path -->
  <path d="M300,120 L100,250" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="20" y="250" width="250" height="150" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="145" y="280" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">LSI (Local)</text>
  <text x="145" y="310" text-anchor="middle" font-family="Arial" font-size="11">PK: userId (Same)</text>
  <text x="145" y="330" text-anchor="middle" font-family="Arial" font-size="11">SK: amount (New)</text>
  <text x="145" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#c2410c">Consistency: Strong OK</text>
  <text x="145" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#c2410c">Limit: 5 per table</text>

  <!-- GSI Path -->
  <path d="M500,120 L700,250" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="530" y="250" width="250" height="150" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="655" y="280" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">GSI (Global)</text>
  <text x="655" y="310" text-anchor="middle" font-family="Arial" font-size="11">PK: email (New)</text>
  <text x="655" y="330" text-anchor="middle" font-family="Arial" font-size="11">SK: - (Optional)</text>
  <text x="655" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c">Consistency: Eventual Only</text>
  <text x="655" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c">Limit: 20 (Soft)</text>

  <!-- Comparison Logic -->
  <rect x="40" y="450" width="720" height="350" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="470" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Architectural Decision Matrix</text>

  <rect x="100" y="500" width="600" height="250" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="530" font-family="Arial" font-size="12" font-weight="bold">Key Differences:</text>
  
  <text x="120" y="560" font-family="Arial" font-size="11" font-weight="bold">LSI Characteristics:</text>
  <text x="120" y="580" font-family="Arial" font-size="11">- Must be defined at table creation.</text>
  <text x="120" y="600" font-family="Arial" font-size="11">- 10GB limit per item collection.</text>
  <text x="120" y="620" font-family="Arial" font-size="11">- Shares throughput with base table.</text>

  <text x="450" y="560" font-family="Arial" font-size="11" font-weight="bold">GSI Characteristics:</text>
  <text x="450" y="580" font-family="Arial" font-size="11">- Can be added/deleted anytime.</text>
  <text x="450" y="600" font-family="Arial" font-size="11">- No 10GB item collection limit.</text>
  <text x="450" y="620" font-family="Arial" font-size="11">- Has its own RCU/WCU settings.</text>

  <text x="400" y="720" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#232F3E">Expert Tip: Prefer GSI for flexibility unless strong consistency is mandatory.</text>
</svg>