<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">3. Operations &amp; Performance at Scale</text>

  <!-- Streams Comparison -->
  <rect x="40" y="65" width="720" height="190" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="89" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">DynamoDB Streams vs Kinesis Data Streams</text>
  <line x1="60" y1="97" x2="740" y2="97" stroke="#6c8ebf" stroke-width="1"/>
  <rect x="60" y="105" width="300" height="135" rx="6" fill="#fff" stroke="#6c8ebf" stroke-width="1"/>
  <text x="210" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">DynamoDB Streams</text>
  <text x="80" y="145" font-family="Arial" font-size="11">• Built-in feature (not separate service)</text>
  <text x="80" y="163" font-family="Arial" font-size="11">• 24-hour retention only</text>
  <text x="80" y="181" font-family="Arial" font-size="11">• Tight Lambda integration</text>
  <text x="80" y="199" font-family="Arial" font-size="11">• Use for: triggers, email on insert</text>
  <text x="80" y="217" font-family="Arial" font-size="11">• Stream types: KEYS_ONLY, NEW_IMAGE,</text>
  <text x="80" y="232" font-family="Arial" font-size="11">  OLD_IMAGE, NEW_AND_OLD_IMAGES</text>
  <rect x="420" y="105" width="300" height="135" rx="6" fill="#fff" stroke="#82b366" stroke-width="1"/>
  <text x="570" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Amazon Kinesis Data Streams</text>
  <text x="440" y="145" font-family="Arial" font-size="11">• Separate AWS service</text>
  <text x="440" y="163" font-family="Arial" font-size="11">• Retention: 1–365 days configurable</text>
  <text x="440" y="181" font-family="Arial" font-size="11">• Multiple consumers (fan-out)</text>
  <text x="440" y="199" font-family="Arial" font-size="11">• Use for: analytics, fraud detection,</text>
  <text x="440" y="217" font-family="Arial" font-size="11">  long-term real-time dashboards</text>
  <line x1="360" y1="172" x2="420" y2="172" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="390" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">OR</text>

  <!-- Transactions -->
  <rect x="40" y="270" width="720" height="95" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="294" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Transactions (ACID)</text>
  <line x1="60" y1="302" x2="740" y2="302" stroke="#82b366" stroke-width="1"/>
  <text x="60" y="322" font-family="Arial" font-size="11">TransactWriteItems / TransactGetItems — max 100 items per transaction</text>
  <text x="60" y="340" font-family="Arial" font-size="11">Costs 2× WCU per write (extra phase for coordination: lock → verify → commit → rollback on fail)</text>
  <text x="60" y="358" font-family="Arial" font-size="11">Use for: payment debit/credit, booking + inventory decrement in a single atomic operation</text>

  <!-- DAX -->
  <rect x="40" y="380" width="720" height="190" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="400" y="404" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">DAX (DynamoDB Accelerator) — Microsecond Reads</text>
  <line x1="60" y1="412" x2="740" y2="412" stroke="#d6b656" stroke-width="1"/>
  <!-- Flow -->
  <rect x="60" y="422" width="130" height="40" rx="6" fill="#fff" stroke="#d6b656" stroke-width="1"/>
  <text x="125" y="447" text-anchor="middle" font-family="Arial" font-size="11">Your App</text>
  <line x1="190" y1="442" x2="225" y2="442" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="225" y="422" width="160" height="40" rx="6" fill="#FFD580" stroke="#c77700" stroke-width="1"/>
  <text x="305" y="447" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">DAX Cluster</text>
  <line x1="385" y1="442" x2="420" y2="442" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="420" y="422" width="140" height="40" rx="6" fill="#fff" stroke="#d6b656" stroke-width="1"/>
  <text x="490" y="447" text-anchor="middle" font-family="Arial" font-size="11">DynamoDB</text>
  <text x="305" y="480" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Cache Hit → microseconds</text>
  <text x="305" y="496" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Cache Miss → fetch DDB, cache, return</text>
  <text x="60" y="525" font-family="Arial" font-size="11" font-weight="bold">Use DAX when:</text>
  <text x="60" y="543" font-family="Arial" font-size="11">Read-heavy workloads | Hot key mitigation | Sub-millisecond latency requirement</text>
  <text x="60" y="558" font-family="Arial" font-size="11" font-weight="bold">Avoid DAX when:</text>
  <rect x="420" y="510" width="300" height="55" rx="4" fill="#f9f9f9" stroke="#ddd"/>
  <text x="440" y="530" font-family="Arial" font-size="11">✗ Write-heavy (no benefit)</text>
  <text x="440" y="548" font-family="Arial" font-size="11">✗ Strongly consistent reads needed</text>
  <text x="440" y="563" font-family="Arial" font-size="11">✗ Frequently changing data (cache churn)</text>

  <!-- Global Tables + FinOps -->
  <rect x="40" y="585" width="340" height="75" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="210" y="609" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Global Tables</text>
  <text x="60" y="629" font-family="Arial" font-size="11">Same table, multiple regions — auto-sync</text>
  <text x="60" y="647" font-family="Arial" font-size="11">Traffic fails over if region goes down → zero downtime</text>

  <rect x="420" y="585" width="340" height="75" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="590" y="609" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">FinOps: Capacity Modes</text>
  <text x="440" y="629" font-family="Arial" font-size="11">On-Demand · Provisioned · Reserved (≤70% off)</text>
  <text x="440" y="647" font-family="Arial" font-size="11">Switch On-Demand↔Provisioned: once per 24h ⚠️</text>

  <!-- Summary -->
  <rect x="40" y="675" width="720" height="200" fill="#232F3E" rx="8"/>
  <text x="60" y="698" font-family="Arial" font-size="12" font-weight="bold" fill="#FF9900">Key Takeaways:</text>
  <text x="60" y="718" font-family="Arial" font-size="11" fill="#fff">• DynamoDB Streams: 24h only, use for Lambda triggers — not for long-term analytics</text>
  <text x="60" y="736" font-family="Arial" font-size="11" fill="#fff">• Kinesis: configurable retention (365d), multiple consumers — use for analytics pipelines</text>
  <text x="60" y="754" font-family="Arial" font-size="11" fill="#fff">• Transactions: 2× cost but atomic — essential for financial operations involving multiple items</text>
  <text x="60" y="772" font-family="Arial" font-size="11" fill="#fff">• DAX: write-through cache — reads hit cache first; writes go to DDB AND cache simultaneously</text>
  <text x="60" y="790" font-family="Arial" font-size="11" fill="#fff">• Strongly consistent reads BYPASS DAX (go directly to DDB) — be aware of this behavior</text>
  <text x="60" y="808" font-family="Arial" font-size="11" fill="#fff">• Global Tables: Active-Active multi-region — LWW (Last Write Wins) for conflict resolution</text>
  <text x="60" y="826" font-family="Arial" font-size="11" fill="#fff">• Switching capacity modes (On-Demand↔Provisioned) only once per 24h — caused real incidents!</text>
  <text x="60" y="844" font-family="Arial" font-size="11" fill="#fff">• Reserved capacity: commit 1–3 years for up to 70% discount; plan carefully</text>
  <text x="60" y="862" font-family="Arial" font-size="11" fill="#fff">• Stream event userIdentity=DynamoDB → TTL delete; userIdentity=IAM entity → manual delete</text>
</svg>