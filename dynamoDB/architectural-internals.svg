<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>

  <!-- Application Request -->
  <rect x="300" y="20" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="45" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Application Request</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial" font-size="11">(PutItem / Query)</text>

  <!-- Request Router / GAC -->
  <path d="M400,100 L580,170 L400,240 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">1.1 Request Router / GAC</text>
  <text x="400" y="175" text-anchor="middle" font-family="Arial" font-size="11">Gatekeeper: Auth &amp; Limits</text>
  <line x1="400" y1="80" x2="400" y2="100" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hashing -->
  <rect x="300" y="290" width="200" height="70" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">1.3 Partitioning &amp; Hashing</text>
  <text x="400" y="335" text-anchor="middle" font-family="Arial" font-size="11">Determine Storage Location</text>
  <line x1="400" y1="240" x2="400" y2="290" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="270" font-family="Arial" font-size="11" fill="#444">Passes Admission</text>

  <!-- Logical Partition Group -->
  <rect x="40" y="400" width="720" height="380" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="420" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Logical Partition (Max 10GB)</text>
  <line x1="400" y1="360" x2="160" y2="450" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Physical Nodes -->
  <rect x="70" y="450" width="180" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="160" y="485" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-1: Leader</text>
  <text x="160" y="505" text-anchor="middle" font-family="Arial" font-size="11">Primary for WRITES</text>

  <rect x="310" y="450" width="180" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="400" y="485" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-2: Follower</text>
  <text x="400" y="505" text-anchor="middle" font-family="Arial" font-size="11">Eventual Reads</text>

  <rect x="550" y="450" width="180" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="640" y="485" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-3: Follower</text>
  <text x="640" y="505" text-anchor="middle" font-family="Arial" font-size="11">Eventual Reads</text>

  <!-- Replication -->
  <path d="M 250 490 Q 280 460 310 490" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 490 490 Q 520 460 550 490" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="455" font-family="Arial" font-size="10" fill="#666">Async Rep</text>

  <!-- B-Tree Indexing -->
  <polygon points="250,600 550,600 520,700 220,700" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="385" y="640" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">1.4 B-Tree Indexing</text>
  <text x="385" y="660" text-anchor="middle" font-family="Arial" font-size="11">Optimizes SK Range Queries</text>
  <line x1="400" y1="530" x2="400" y2="600" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Adaptive Capacity -->
  <ellipse cx="120" cy="300" rx="80" ry="40" fill="#f0a30a" stroke="#BD7000" stroke-width="2"/>
  <text x="120" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">1.2 Adaptive</text>
  <text x="120" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Capacity</text>
  <path d="M 120 340 Q 120 400 120 435" fill="none" stroke="#f0a30a" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="290" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="310" font-family="Arial" font-size="11" font-weight="bold">Throughput Limits:</text>
  <text x="590" y="330" font-family="Arial" font-size="11">- 1k WCU / sec</text>
  <text x="590" y="345" font-family="Arial" font-size="11">- 3k RCU / sec</text>
</svg>
