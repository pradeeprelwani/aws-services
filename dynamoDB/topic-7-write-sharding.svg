<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">7. Write Sharding for Hot Keys</text>
  
  <!-- Hot Key Entry -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Hot Partition Key</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(e.g., PK = "ACTIVE")</text>

  <!-- Shard Calculator -->
  <rect x="300" y="220" width="200" height="80" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">App Logic: Suffix Gen</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial" font-size="11">Append Random(1, N)</text>
  <line x1="400" y1="140" x2="400" y2="220" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Distributed Keys -->
  <rect x="70" y="380" width="180" height="60" rx="5" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="160" y="415" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">PK: "ACTIVE#1"</text>

  <rect x="310" y="380" width="180" height="60" rx="5" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="415" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">PK: "ACTIVE#2"</text>

  <rect x="550" y="380" width="180" height="60" rx="5" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="640" y="415" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">PK: "ACTIVE#N"</text>

  <line x1="400" y1="300" x2="160" y2="380" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="300" x2="400" y2="380" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="300" x2="640" y2="380" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Storage Partitions -->
  <rect x="40" y="520" width="720" height="200" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="540" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Distributed Physical Partitions</text>

  <rect x="70" y="570" width="180" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="160" y="615" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Partition A</text>

  <rect x="310" y="570" width="180" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="615" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Partition B</text>

  <rect x="550" y="570" width="180" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="615" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Partition C</text>

  <text x="400" y="760" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32">Total Throughput = N * 1,000 WCU</text>
</svg>