<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">12. Consistency Models: Eventual vs Strong</text>
  
  <!-- Client App -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Client Application</text>

  <!-- Request Router -->
  <path d="M400,180 L550,250 L400,320 L250,250 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
  <text x="400" y="250" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Request Router</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Storage Replication -->
  <rect x="40" y="380" width="720" height="300" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="400" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Storage Nodes (3 AZs)</text>

  <rect x="100" y="450" width="180" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="190" y="495" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Leader Node</text>

  <rect x="310" y="450" width="180" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="400" y="495" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Follower 1</text>

  <rect x="520" y="450" width="180" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="610" y="495" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Follower 2</text>

  <line x1="190" y1="530" x2="310" y2="530" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="530" x2="520" y2="530" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="550" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Replication Delay</text>

  <!-- Read Paths -->
  <path d="M400,320 L190,450" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="380" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Strong Read (1 RCU)</text>

  <path d="M400,320 L400,450" stroke="#c2410c" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400,320 L610,450" stroke="#c2410c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="380" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c2410c">Eventual Read (0.5 RCU)</text>

  <!-- Legend -->
  <rect x="100" y="700" width="600" height="100" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="725" font-family="Arial" font-size="12" font-weight="bold">Comparison Summary:</text>
  <text x="120" y="750" font-family="Arial" font-size="11">- Eventual: Stale data risk, Low cost, High availability</text>
  <text x="120" y="770" font-family="Arial" font-size="11">- Strong: Accurate data, 2x Cost, Leader only lookup</text>
  <text x="550" y="750" font-family="Arial" font-size="11" font-weight="bold">Default: Eventual</text>
</svg>