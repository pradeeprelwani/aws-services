<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">13. Conditional Writes &amp; Optimistic Locking</text>
  
  <!-- Concurrent Users -->
  <rect x="100" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="200" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">User A (v1)</text>

  <rect x="500" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">User B (v1)</text>

  <!-- Timeline -->
  <line x1="200" y1="140" x2="200" y2="400" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="140" x2="600" y2="550" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- User A Writes First -->
  <rect x="150" y="250" width="100" height="40" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="200" y="275" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Update v1->v2</text>

  <!-- Condition Check Logic -->
  <path d="M400,320 L500,370 L400,420 L300,370 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
  <text x="400" y="375" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">IF ver == 1</text>
  
  <line x1="250" y1="270" x2="300" y2="370" stroke="#000" stroke-width="1" />
  <line x1="400" y1="420" x2="400" y2="450" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="445" font-family="Arial" font-size="12" fill="#2e7d32" font-weight="bold">SUCCESS (v2 Saved)</text>

  <!-- User B Tries to Write -->
  <rect x="550" y="450" width="100" height="40" fill="#f8cecc" stroke="#b85450" stroke-width="2" opacity="0.6"/>
  <text x="600" y="475" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Update v1->v2</text>

  <path d="M400,500 L500,550 L400,600 L300,550 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
  <text x="400" y="555" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">IF ver == 1</text>
  
  <line x1="550" y1="470" x2="500" y2="550" stroke="#000" stroke-width="1" />
  <line x1="400" y1="600" x2="400" y2="650" stroke="#b91c1c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="645" font-family="Arial" font-size="12" fill="#b91c1c" font-weight="bold">REJECTED (Version is now 2)</text>

  <!-- Legend -->
  <rect x="100" y="700" width="600" height="100" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="725" font-family="Arial" font-size="12" font-weight="bold">Optimistic Locking Pattern:</text>
  <text x="120" y="750" font-family="Arial" font-size="11">- Prevent "Lost Updates" in concurrent environments</text>
  <text x="120" y="770" font-family="Arial" font-size="11">- Use ConditionExpression: "version = :expectedVersion"</text>
  <text x="550" y="750" font-family="Arial" font-size="11" font-weight="bold">ACID Compliant</text>
</svg>