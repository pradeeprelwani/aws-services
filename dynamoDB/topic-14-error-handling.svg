<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">14. Error Handling: Exponential Backoff &amp; Jitter</text>
  
  <!-- Burst Load -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">1,000 Concurrent Req</text>

  <!-- Throttling Event -->
  <path d="M400,180 L500,230 L400,280 L300,230 Z" fill="#f8cecc" stroke="#b85450" stroke-width="2" />
  <text x="400" y="235" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#b85450">429 THROTTLE</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Exponential Backoff -->
  <rect x="100" y="350" width="600" height="150" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="110" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Retry Strategy (SDK Default)</text>

  <rect x="150" y="400" width="120" height="60" rx="5" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="210" y="435" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Wait 1s</text>

  <rect x="340" y="400" width="120" height="60" rx="5" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="400" y="435" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Wait 2s</text>

  <rect x="530" y="400" width="120" height="60" rx="5" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="590" y="435" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Wait 4s</text>

  <line x1="270" y1="430" x2="340" y2="430" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="460" y1="430" x2="530" y2="430" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Jitter Visualization -->
  <rect x="40" y="550" width="720" height="120" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="580" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">The Power of Jitter</text>
  
  <line x1="100" y1="620" x2="700" y2="620" stroke="#666" stroke-width="2" />
  <circle cx="150" cy="620" r="5" fill="#b91c1c" />
  <circle cx="280" cy="620" r="5" fill="#b91c1c" />
  <circle cx="410" cy="620" r="5" fill="#b91c1c" />
  <circle cx="650" cy="620" r="5" fill="#b91c1c" />
  <text x="400" y="645" text-anchor="middle" font-family="Arial" font-size="11">Randomized Spreading of Thundering Herds</text>

  <!-- Legend -->
  <rect x="100" y="700" width="600" height="100" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="725" font-family="Arial" font-size="12" font-weight="bold">SDK Configuration Tip:</text>
  <text x="120" y="750" font-family="Arial" font-size="11">- Standard AWS SDK has these built-in</text>
  <text x="120" y="770" font-family="Arial" font-size="11">- Increase maxRetries for heavy data migration jobs</text>
</svg>