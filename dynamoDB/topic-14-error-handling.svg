<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">14. Error Handling: Exponential Backoff &amp; Jitter</text>

  <!-- Initial API Call -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">API Request (T0)</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(PutItem / Query)</text>

  <!-- Error Detection Diamond -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Error Detector</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">Code: 400 (Throttling)</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Backoff Engine -->
  <rect x="300" y="350" width="200" height="70" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Wait Strategy</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="11">Exponential (2^n) + Jitter</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Timeline Axis Container -->
  <rect x="40" y="460" width="720" height="320" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="480" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Retry Propagation Timeline</text>

  <!-- Timeline Horizontal Line -->
  <line x1="80" y1="650" x2="720" y2="650" stroke="#545B64" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="700" y="680" font-family="Arial" font-size="12">Time (s)</text>

  <!-- Failed Attempt 1 -->
  <circle cx="100" cy="650" r="10" fill="#d9534f"/>
  <text x="100" y="630" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Fail 💥</text>

  <!-- Retry 1 Arc -->
  <path d="M 100 650 Q 150 550 200 650" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="150" y="580" text-anchor="middle" font-family="Arial" font-size="10">1.1s Wait</text>
  <circle cx="200" cy="650" r="10" fill="#f0a30a"/>
  <text x="200" y="680" text-anchor="middle" font-family="Arial" font-size="10">Retry 1</text>

  <!-- Retry 2 Arc -->
  <path d="M 200 650 Q 300 480 400 650" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="300" y="520" text-anchor="middle" font-family="Arial" font-size="10">2.3s Wait</text>
  <circle cx="400" cy="650" r="10" fill="#f0a30a"/>
  <text x="400" y="680" text-anchor="middle" font-family="Arial" font-size="10">Retry 2</text>

  <!-- Success Arc -->
  <path d="M 400 650 Q 550 400 700 650" fill="none" stroke="#2ca02c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="460" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2ca02c">4.7s Wait → Success ✅</text>
  <circle cx="700" cy="650" r="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">Why Jitter?</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- Avoids "Thundering Herd"</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- Spreads load over time</text>

  <!-- Flow Line -->
  <line x1="400" y1="420" x2="400" y2="460" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>