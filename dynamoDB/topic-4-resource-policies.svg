<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">4. Security: Advanced Resource-Based Policies</text>

  <!-- External Account B Request -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Account B Principal</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(Cross-Account Consumer)</text>

  <!-- Permission Gatekeeper -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">IAM Auth Evaluator</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">Resource Policy Check</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Resource Policy Logic -->
  <rect x="300" y="350" width="200" height="100" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">JSON Policy Document</text>
  <text x="400" y="405" text-anchor="middle" font-family="Arial" font-size="11" fill="#b85450">Effect: Allow</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial" font-size="11" fill="#b85450">Principal: Account-B</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Target Table Container -->
  <rect x="40" y="480" width="720" height="300" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="500" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Account A (Resource Owner)</text>

  <!-- Protected DynamoDB Table -->
  <rect x="250" y="550" width="300" height="150" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="585" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">DynamoDB: UsersTable</text>
  <rect x="270" y="610" width="260" height="70" fill="#fff" opacity="0.6" rx="4"/>
  <text x="400" y="635" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#666">Cross-Account Identity</text>
  <text x="400" y="655" text-anchor="middle" font-family="Arial" font-size="10" fill="#d9534f">arn:aws:iam::222222222222:root</text>

  <!-- Access Status -->
  <circle cx="150" cy="625" r="40" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="150" y="630" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">GRANT</text>
  
  <circle cx="650" cy="625" r="40" fill="#f8cecc" stroke="#b85450" stroke-width="2" opacity="0.5"/>
  <text x="650" y="630" text-anchor="middle" font-family="Arial" font-size="10">DENY-BY-DEFAULT</text>

  <!-- Flow Line -->
  <line x1="400" y1="450" x2="400" y2="550" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">Key Benefits:</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- No IAM Role Assume</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- Lower Latency Access</text>
</svg>