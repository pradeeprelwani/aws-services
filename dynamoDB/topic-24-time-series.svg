<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">24. Time-Series Pattern</text>

  <!-- Data Sources -->
  <rect x="40" y="75" width="140" height="60" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="110" y="101" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">IoT Sensor</text>
  <text x="110" y="118" text-anchor="middle" font-family="Arial" font-size="10">Readings / Events</text>

  <rect x="330" y="75" width="140" height="60" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="101" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">User Activity</text>
  <text x="400" y="118" text-anchor="middle" font-family="Arial" font-size="10">Logs / Clicks</text>

  <rect x="620" y="75" width="140" height="60" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="690" y="101" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Stock Prices</text>
  <text x="690" y="118" text-anchor="middle" font-family="Arial" font-size="10">Time-stamped data</text>

  <!-- Key Design -->
  <path d="M400,280 L580,350 L400,420 L220,290 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="345" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Key Design</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="11">PK = SENSOR_ID  |  SK = TIMESTAMP</text>
  <line x1="110" y1="135" x2="290" y2="310" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="135" x2="400" y2="300" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="135" x2="510" y2="310" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Write Pattern -->
  <rect x="40" y="480" width="320" height="120" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="200" y="505" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Append-Only Write Pattern</text>
  <text x="200" y="523" text-anchor="middle" font-family="Arial" font-size="10">S1 | 10:00 -> new item</text>
  <text x="200" y="540" text-anchor="middle" font-family="Arial" font-size="10">S1 | 10:05 -> new item</text>
  <text x="200" y="557" text-anchor="middle" font-family="Arial" font-size="10">S1 | 10:10 -> new item</text>
  <text x="200" y="578" text-anchor="middle" font-family="Arial" font-size="10" fill="#82b366">No locks | No joins | Scales massively</text>

  <!-- Range Query -->
  <rect x="440" y="480" width="320" height="120" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="600" y="505" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Efficient Range Query</text>
  <text x="600" y="525" text-anchor="middle" font-family="Arial" font-size="10">Query PK = "S1"</text>
  <text x="600" y="543" text-anchor="middle" font-family="Arial" font-size="10">AND SK BETWEEN</text>
  <text x="600" y="561" text-anchor="middle" font-family="Arial" font-size="10">"10:00" AND "10:10"</text>
  <text x="600" y="583" text-anchor="middle" font-family="Arial" font-size="10" fill="#b85450">B-Tree sorted scan (very fast)</text>

  <line x1="310" y1="440" x2="200" y2="480" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="440" x2="600" y2="480" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DynamoDB vs SQL box -->
  <rect x="40" y="640" width="720" height="170" rx="8" fill="#f9f9f9" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="665" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Why DynamoDB over SQL for Time-Series?</text>

  <rect x="60" y="680" width="300" height="110" rx="5" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="210" y="700" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">SQL</text>
  <text x="210" y="718" text-anchor="middle" font-family="Arial" font-size="10">Index scans at huge scale</text>
  <text x="210" y="734" text-anchor="middle" font-family="Arial" font-size="10">Disk I/O + sharding complexity</text>
  <text x="210" y="750" text-anchor="middle" font-family="Arial" font-size="10">Locks on write contention</text>
  <text x="210" y="778" text-anchor="middle" font-family="Arial" font-size="10" fill="#b85450">Struggles at millions of writes/sec</text>

  <rect x="440" y="680" width="300" height="110" rx="5" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="590" y="700" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">DynamoDB</text>
  <text x="590" y="718" text-anchor="middle" font-family="Arial" font-size="10">Direct partition lookup</text>
  <text x="590" y="734" text-anchor="middle" font-family="Arial" font-size="10">B-Tree sorted SK range scan</text>
  <text x="590" y="750" text-anchor="middle" font-family="Arial" font-size="10">No locks — append-only</text>
  <text x="590" y="778" text-anchor="middle" font-family="Arial" font-size="10" fill="#82b366">Built for millions of writes/sec</text>
</svg>
