<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">34. Data Migration Strategy (SQL to DynamoDB)</text>

  <!-- Phase Flow -->
  <rect x="40" y="60" width="720" height="60" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="84" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Large-Scale Migration: 3 Pillars</text>
  <text x="400" y="107" text-anchor="middle" font-family="Arial" font-size="11">Batching + Parallelism + Monitoring — never migrate everything at once in one huge call</text>
  <line x1="400" y1="120" x2="400" y2="150" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pillar 1: Batching -->
  <rect x="40" y="150" width="720" height="150" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="174" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">✅ Pillar 1: Batching (BatchWriteItem)</text>
  <text x="60" y="195" font-family="Arial" font-size="11">• DynamoDB BatchWriteItem: max 25 items/call, max 16 MB/call</text>
  <text x="60" y="213" font-family="Arial" font-size="11">• 10 million rows ÷ 25 = 400,000 batch requests (manageable and retryable)</text>
  <text x="60" y="231" font-family="Arial" font-size="11">• Flow: Send 25 items → success ✔ | failure → retry only those 25 (not the whole dataset)</text>
  <text x="60" y="249" font-family="Arial" font-size="11">• Use pagination (LastEvaluatedKey from SQL offset or cursor) to process in safe chunks</text>
  <text x="60" y="267" font-family="Arial" font-size="11">• Analogy: Moving house in many small boxes — one broken box doesn't ruin the whole move</text>
  <text x="60" y="285" font-family="Arial" font-size="11">• Tool: AWS DMS (Database Migration Service) or custom Node.js script</text>
  <line x1="400" y1="300" x2="400" y2="330" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pillar 2: Parallelism -->
  <rect x="40" y="330" width="720" height="155" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="400" y="354" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">✅ Pillar 2: Parallelism (Multiple Workers)</text>
  <text x="60" y="375" font-family="Arial" font-size="11">• Single worker (sequential): 10M rows ÷ 25/call = ~5.5 hours for full migration</text>
  <text x="60" y="393" font-family="Arial" font-size="11">• 10 parallel workers: each handles 1M rows → ~33 minutes (10x faster)</text>
  <!-- Worker diagram -->
  <rect x="60" y="405" width="145" height="45" rx="4" fill="#fff" stroke="#d6b656" stroke-width="1.5"/>
  <text x="133" y="422" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Worker 1</text>
  <text x="133" y="440" text-anchor="middle" font-family="Arial" font-size="10">Batch 1,11,21...</text>
  <rect x="220" y="405" width="145" height="45" rx="4" fill="#fff" stroke="#d6b656" stroke-width="1.5"/>
  <text x="293" y="422" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Worker 2</text>
  <text x="293" y="440" text-anchor="middle" font-family="Arial" font-size="10">Batch 2,12,22...</text>
  <rect x="380" y="405" width="145" height="45" rx="4" fill="#fff" stroke="#d6b656" stroke-width="1.5"/>
  <text x="453" y="422" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Worker 3</text>
  <text x="453" y="440" text-anchor="middle" font-family="Arial" font-size="10">Batch 3,13,23...</text>
  <text x="555" y="430" text-anchor="middle" font-family="Arial" font-size="14">...</text>
  <rect x="600" y="405" width="145" height="45" rx="4" fill="#fff" stroke="#d6b656" stroke-width="1.5"/>
  <text x="673" y="422" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Worker N</text>
  <text x="673" y="440" text-anchor="middle" font-family="Arial" font-size="10">Remaining batches</text>
  <text x="60" y="468" font-family="Arial" font-size="11">⚠ Tune workers: too few → slow, too many → exceed DynamoDB WCU → throttling</text>
  <line x1="400" y1="485" x2="400" y2="515" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pillar 3: Monitoring + DLQ -->
  <rect x="40" y="515" width="720" height="140" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="539" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">✅ Pillar 3: Monitoring + Dead Letter Queue (DLQ)</text>
  <text x="60" y="560" font-family="Arial" font-size="11">• Without monitoring: 50 failed rows out of 10M go unnoticed forever → data corruption</text>
  <text x="60" y="578" font-family="Arial" font-size="11">• With DLQ: Failed batches → go into DLQ queue → main migration continues uninterrupted</text>
  <text x="60" y="596" font-family="Arial" font-size="11">• After migration: process DLQ items separately → retry or investigate failures</text>
  <text x="60" y="614" font-family="Arial" font-size="11">• CloudWatch metrics to track: SuccessCount, FailureCount, BatchesPending, ThrottledRequests</text>
  <text x="60" y="632" font-family="Arial" font-size="11">• Set CloudWatch alarm: if FailureCount &gt; 0 → alert immediately</text>
  <text x="60" y="650" font-family="Arial" font-size="11">• Use SQS as DLQ: failed record → SQS message → retry Lambda processes it async</text>
  <line x1="400" y1="655" x2="400" y2="685" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Comparison Table -->
  <rect x="40" y="685" width="720" height="170" rx="8" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="60" y="707" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Concepts at a Glance:</text>
  <rect x="60" y="715" width="680" height="25" fill="#232F3E"/>
  <text x="170" y="732" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold">Concept</text>
  <text x="390" y="732" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold">Problem it Solves</text>
  <text x="630" y="732" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold">Analogy</text>
  <rect x="60" y="740" width="680" height="22" fill="#e8f5e9" stroke="#ccc" stroke-width="1"/>
  <text x="170" y="755" text-anchor="middle" font-family="Arial" font-size="11">Batching</text>
  <text x="390" y="755" text-anchor="middle" font-family="Arial" font-size="11">Prevents crash from huge requests</text>
  <text x="630" y="755" text-anchor="middle" font-family="Arial" font-size="11">Small boxes for moving house</text>
  <rect x="60" y="762" width="680" height="22" fill="#fff3e0" stroke="#ccc" stroke-width="1"/>
  <text x="170" y="777" text-anchor="middle" font-family="Arial" font-size="11">Parallelism</text>
  <text x="390" y="777" text-anchor="middle" font-family="Arial" font-size="11">Makes migration fast enough</text>
  <text x="630" y="777" text-anchor="middle" font-family="Arial" font-size="11">Many movers working together</text>
  <rect x="60" y="784" width="680" height="22" fill="#e8f5e9" stroke="#ccc" stroke-width="1"/>
  <text x="170" y="799" text-anchor="middle" font-family="Arial" font-size="11">DLQ</text>
  <text x="390" y="799" text-anchor="middle" font-family="Arial" font-size="11">Ensures no data is lost</text>
  <text x="630" y="799" text-anchor="middle" font-family="Arial" font-size="11">Rejection bin for retries</text>
  <rect x="60" y="806" width="680" height="22" fill="#fff3e0" stroke="#ccc" stroke-width="1"/>
  <text x="170" y="821" text-anchor="middle" font-family="Arial" font-size="11">Monitoring</text>
  <text x="390" y="821" text-anchor="middle" font-family="Arial" font-size="11">Shows progress and failures</text>
  <text x="630" y="821" text-anchor="middle" font-family="Arial" font-size="11">Tracking number for every box</text>

  <!-- Note -->
  <rect x="40" y="880" width="720" height="30" fill="#f9f9f9" stroke="#ddd"/>
  <text x="60" y="900" font-family="Arial" font-size="11">See also: Topic 9 (Zero-Downtime Migration) and Topic 10 (SQL to DynamoDB strategy) for full migration workflow</text>
</svg>
