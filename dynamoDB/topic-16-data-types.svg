<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">16. DynamoDB Data Types &amp; Limits</text>
  
  <!-- Item Envelope -->
  <rect x="40" y="80" width="720" height="500" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="100" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Single Item (Row) - Max 400 KB</text>

  <!-- Scalars -->
  <rect x="80" y="130" width="200" height="150" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="180" y="160" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Scalars</text>
  <text x="180" y="190" text-anchor="middle" font-family="Arial" font-size="11">- String (S)</text>
  <text x="180" y="210" text-anchor="middle" font-family="Arial" font-size="11">- Number (N)</text>
  <text x="180" y="230" text-anchor="middle" font-family="Arial" font-size="11">- Boolean (BOOL)</text>
  <text x="180" y="250" text-anchor="middle" font-family="Arial" font-size="11">- Null (NULL)</text>

  <!-- Documents -->
  <rect x="300" y="130" width="200" height="150" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Documents</text>
  <text x="400" y="190" text-anchor="middle" font-family="Arial" font-size="11">- Map (M): JSON Objects</text>
  <text x="400" y="210" text-anchor="middle" font-family="Arial" font-size="11">- List (L): Ordered Arrays</text>
  <text x="400" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#b85450">Deep Nesting Allowed (32 levels)</text>

  <!-- Sets -->
  <rect x="520" y="130" width="200" height="150" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="620" y="160" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Sets (Unique)</text>
  <text x="620" y="190" text-anchor="middle" font-family="Arial" font-size="11">- String Set (SS)</text>
  <text x="620" y="210" text-anchor="middle" font-family="Arial" font-size="11">- Number Set (NS)</text>
  <text x="620" y="230" text-anchor="middle" font-family="Arial" font-size="11">- Binary Set (BS)</text>

  <!-- Limits Section -->
  <rect x="40" y="620" width="720" height="180" fill="#f9f9f9" stroke="#ddd" />
  <text x="60" y="650" font-family="Arial" font-size="13" font-weight="bold">Constraint Guardrails:</text>
  
  <text x="80" y="680" font-family="Arial" font-size="12" font-weight="bold">Size:</text>
  <text x="130" y="680" font-family="Arial" font-size="11">Attributes + Names &lt; 400 KB</text>

  <text x="80" y="710" font-family="Arial" font-size="12" font-weight="bold">Keys:</text>
  <text x="130" y="710" font-family="Arial" font-size="11">PK max 2048 bytes | SK max 1024 bytes</text>

  <text x="80" y="740" font-family="Arial" font-size="12" font-weight="bold">Hierarchy:</text>
  <text x="140" y="740" font-family="Arial" font-size="11">32 Levels max depth for Maps/Lists</text>

  <rect x="550" y="650" width="150" height="100" fill="#fff" stroke="#999" stroke-dasharray="3,3" />
  <text x="625" y="680" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Storage Tip:</text>
  <text x="625" y="705" text-anchor="middle" font-family="Arial" font-size="11">Store large files</text>
  <text x="625" y="720" text-anchor="middle" font-family="Arial" font-size="11">in S3; store URL</text>
  <text x="625" y="735" text-anchor="middle" font-family="Arial" font-size="11">in DynamoDB.</text>
</svg>