<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">8. Enterprise Import/Export &amp; Zero-ETL</text>
  
  <!-- S3 Source -->
  <rect x="50" y="80" width="180" height="100" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="140" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Amazon S3</text>
  <text x="140" y="145" text-anchor="middle" font-family="Arial" font-size="11">(CSV / JSON / Ion)</text>

  <!-- Import Job -->
  <path d="M400,80 L500,130 L400,180 L300,130 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,0)"/>
  <text x="400" y="130" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Import Job</text>
  <text x="400" y="145" text-anchor="middle" font-family="Arial" font-size="10">Zero WCU Cost</text>
  <line x1="230" y1="130" x2="300" y2="130" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DynamoDB Target -->
  <rect x="570" y="80" width="180" height="100" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="660" y="135" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">New Table</text>
  <line x1="500" y1="130" x2="570" y2="130" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="400" y1="180" x2="400" y2="280" stroke="#999" stroke-dasharray="5,5" />

  <!-- Zero-ETL Sync -->
  <rect x="40" y="350" width="720" height="400" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Zero-ETL Search Analytics Pipeline</text>

  <rect x="100" y="420" width="180" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="190" y="465" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">DDB Source Table</text>

  <!-- Kinesis Adapter -->
  <rect x="350" y="420" width="100" height="80" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="465" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CDC Stream</text>
  <line x1="280" y1="460" x2="350" y2="460" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OpenSearch -->
  <rect x="520" y="420" width="180" height="80" rx="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="610" y="465" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">OpenSearch Service</text>
  <line x1="450" y1="460" x2="520" y2="460" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Search Queries -->
  <path d="M610,650 L710,700 L610,750 L510,700 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
  <text x="610" y="700" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Fuzzy Search</text>
  <line x1="610" y1="500" x2="610" y2="650" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="100" y="650" width="250" height="100" fill="#f9f9f9" stroke="#ddd" />
  <text x="110" y="675" font-family="Arial" font-size="12" font-weight="bold">Search Logic:</text>
  <text x="110" y="695" font-family="Arial" font-size="11">- Typos (Fuzzy)</text>
  <text x="110" y="715" font-family="Arial" font-size="11">- Full-text indexing</text>
</svg>