<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">11. DynamoDB Performance Optimization</text>
  
  <!-- Parallel Scans/Queries -->
  <rect x="40" y="80" width="720" height="250" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="100" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Parallel Processing Pattern (100k+ Records)</text>

  <rect x="100" y="130" width="150" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="175" y="165" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Worker 1</text>

  <rect x="325" y="130" width="150" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Worker 2</text>

  <rect x="550" y="130" width="150" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="625" y="165" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Worker N</text>

  <line x1="175" y1="190" x2="175" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="190" x2="400" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="625" y1="190" x2="625" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="100" y="250" width="600" height="60" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="285" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Batch Processing (BatchGet/BatchWrite)</text>

  <!-- Hot Key Mitigation -->
  <rect x="40" y="380" width="720" height="400" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="400" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Hot Key &amp; Caching Strategy</text>

  <ellipse cx="200" cy="500" rx="100" ry="50" fill="#f0a30a" stroke="#BD7000" stroke-width="2"/>
  <text x="200" y="505" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">DAX Cache</text>

  <rect x="450" y="450" width="250" height="100" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="575" y="505" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">DynamoDB Table</text>
  
  <line x1="300" y1="500" x2="450" y2="500" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="490" text-anchor="middle" font-family="Arial" font-size="11">Cache Miss</text>

  <!-- Comparison Table Legend -->
  <rect x="100" y="620" width="600" height="120" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="645" font-family="Arial" font-size="12" font-weight="bold">Optimization Cheat Sheet:</text>
  <text x="120" y="670" font-family="Arial" font-size="11">- Sequential (Avoid) vs Parallel (Prefer)</text>
  <text x="120" y="690" font-family="Arial" font-size="11">- Scan (Avoid) vs Query (Prefer)</text>
  <text x="120" y="710" font-family="Arial" font-size="11">- Item Size (Small) vs Large Blobs (S3)</text>
  <text x="450" y="670" font-family="Arial" font-size="11">- Pagination via LastEvaluatedKey</text>
  <text x="450" y="690" font-family="Arial" font-size="11">- Write Sharding for Hot Keys</text>
</svg>