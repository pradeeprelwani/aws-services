<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">10. SQL to DynamoDB: Functional Rewrite Flow</text>

  <!-- Normalized SQL Request -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">SQL Access Pattern</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(JOIN Users + Orders + Items)</text>

  <!-- Analysis / Decision Engine -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Denormalization Engine</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">Model for Queries, Not Objects</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Transformation Logic -->
  <rect x="300" y="350" width="200" height="70" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Grouping Logic</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="11">Reduce Multiple Tables to 1 Map</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NoSQL Architecture Container -->
  <rect x="40" y="460" width="720" height="320" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="480" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Denormalized Target Model</text>

  <!-- Source Tables (Greyed Out) -->
  <rect x="70" y="510" width="180" height="120" fill="#f5f5f5" stroke="#666" stroke-width="2" opacity="0.6"/>
  <text x="160" y="540" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Source SQL Tables</text>
  <text x="160" y="565" font-family="Arial" font-size="10">- Users Table</text>
  <text x="160" y="585" font-family="Arial" font-size="10">- Orders Table</text>
  <text x="160" y="605" font-family="Arial" font-size="10">- LineItems Table</text>

  <!-- Resulting Item -->
  <rect x="320" y="510" width="380" height="120" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="510" y="540" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Target DDB Item (Single Record)</text>
  <rect x="335" y="555" width="350" height="60" fill="#fff" opacity="0.5" rx="4"/>
  <text x="345" y="575" font-family="Arial" font-size="10">PK: USER#123 | SK: ORDER#999</text>
  <text x="345" y="590" font-family="Arial" font-size="10" fill="#2ca02c">data: { "user_name": "Pradeep", "items": [...] }</text>

  <!-- Computation Diamond -->
  <polygon points="250,680 550,680 520,760 220,760" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="385" y="715" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Pre-Computed Attributes</text>
  <text x="385" y="735" text-anchor="middle" font-family="Arial" font-size="11">LikeCount, OrderTotal, etc. (Set at Write Time)</text>

  <!-- Connections -->
  <line x1="400" y1="420" x2="400" y2="460" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="630" x2="385" y2="680" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="510" y1="630" x2="385" y2="680" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">The Mindset:</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- Write is cheaper</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- Read must be atomic</text>
</svg>