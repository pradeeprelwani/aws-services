<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">10. SQL -> DynamoDB Strategy Shift</text>
  
  <!-- SQL Model -->
  <rect x="50" y="80" width="180" height="150" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="140" y="110" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Relational (SQL)</text>
  <text x="140" y="140" text-anchor="middle" font-family="Arial" font-size="11">Table: Users</text>
  <text x="140" y="155" text-anchor="middle" font-family="Arial" font-size="11">Table: Orders</text>
  <text x="140" y="170" text-anchor="middle" font-family="Arial" font-size="11">Table: Items</text>
  <text x="140" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#6c8ebf" font-weight="bold">Normalized</text>

  <!-- Design Phase -->
  <path d="M400,80 L520,155 L400,230 L280,155 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
  <text x="400" y="150" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Access Pattern</text>
  <text x="400" y="165" text-anchor="middle" font-family="Arial" font-size="11">Driven Modeling</text>
  <line x1="230" y1="155" x2="280" y2="155" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Denormalization Processor -->
  <rect x="570" y="80" width="180" height="150" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="660" y="120" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Denormalization</text>
  <text x="660" y="145" text-anchor="middle" font-family="Arial" font-size="11">Combine Entities</text>
  <text x="660" y="160" text-anchor="middle" font-family="Arial" font-size="11">Pre-calculate Joins</text>
  <line x1="520" y1="155" x2="570" y2="155" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DynamoDB Target -->
  <rect x="40" y="350" width="720" height="400" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Single-Table Result (NoSQL)</text>

  <rect x="250" y="420" width="300" height="200" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="455" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Unified "AppTable"</text>
  
  <rect x="270" y="480" width="260" height="40" fill="#fff" opacity="0.6" />
  <text x="400" y="505" text-anchor="middle" font-family="Arial" font-size="11">PK: USER#ID | SK: PROFILE</text>

  <rect x="270" y="530" width="260" height="40" fill="#fff" opacity="0.6" />
  <text x="400" y="555" text-anchor="middle" font-family="Arial" font-size="11">PK: USER#ID | SK: ORDER#DATE</text>

  <line x1="660" y1="230" x2="660" y2="300" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="530" y="630" width="230" height="100" fill="#f9f9f9" stroke="#ddd" />
  <text x="540" y="655" font-family="Arial" font-size="12" font-weight="bold">Scaling Strategy:</text>
  <text x="540" y="675" font-family="Arial" font-size="11">- Compute Cost → DB Storage Cost</text>
  <text x="540" y="695" font-family="Arial" font-size="11">- Horizontal scaling via Sharding</text>
  <text x="540" y="715" font-family="Arial" font-size="11">- Millisecond latency at any scale</text>
</svg>