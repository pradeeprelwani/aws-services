<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">30. Global Tables — Conflict Resolution</text>

  <!-- What are Global Tables -->
  <rect x="40" y="60" width="720" height="75" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="84" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">What Are Global Tables?</text>
  <text x="60" y="104" font-family="Arial" font-size="11">• Same DynamoDB table replicated across multiple AWS regions simultaneously — Active-Active</text>
  <text x="60" y="122" font-family="Arial" font-size="11">• Each region can READ and WRITE independently — seamless failover if one region goes down</text>

  <!-- Setup Diagram -->
  <rect x="40" y="150" width="720" height="140" rx="8" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="60" y="172" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Active-Active Multi-Region Setup:</text>
  <!-- India -->
  <rect x="80" y="185" width="180" height="85" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="170" y="208" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">India (ap-south-1)</text>
  <text x="170" y="227" text-anchor="middle" font-family="Arial" font-size="11">Read ✔</text>
  <text x="170" y="245" text-anchor="middle" font-family="Arial" font-size="11">Write ✔</text>
  <text x="170" y="263" text-anchor="middle" font-family="Arial" font-size="11">name = "Pradeep Kumar"</text>
  <!-- Auto sync arrows -->
  <line x1="260" y1="228" x2="330" y2="228" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="245" x2="260" y2="245" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="295" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">auto-sync</text>
  <!-- US -->
  <rect x="330" y="185" width="180" height="85" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="420" y="208" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">US (us-east-1)</text>
  <text x="420" y="227" text-anchor="middle" font-family="Arial" font-size="11">Read ✔</text>
  <text x="420" y="245" text-anchor="middle" font-family="Arial" font-size="11">Write ✔</text>
  <text x="420" y="263" text-anchor="middle" font-family="Arial" font-size="11">name = "Pradeep R"</text>
  <!-- EU -->
  <line x1="510" y1="228" x2="580" y2="228" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="245" x2="510" y2="245" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">auto-sync</text>
  <rect x="580" y="185" width="160" height="85" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="660" y="208" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">EU (eu-west-1)</text>
  <text x="660" y="227" text-anchor="middle" font-family="Arial" font-size="11">Read ✔</text>
  <text x="660" y="245" text-anchor="middle" font-family="Arial" font-size="11">Write ✔</text>

  <line x1="400" y1="290" x2="400" y2="320" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Conflict Problem -->
  <rect x="40" y="320" width="720" height="115" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="344" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">⚠ The Conflict Problem</text>
  <text x="60" y="365" font-family="Arial" font-size="11">Same item updated in 2 regions at the EXACT same time — which value wins?</text>
  <text x="60" y="383" font-family="Arial" font-size="11">India: name = "Pradeep Kumar"  |  timestamp = 10:00:01.100</text>
  <text x="60" y="401" font-family="Arial" font-size="11">US:   name = "Pradeep R"         |  timestamp = 10:00:02.200</text>
  <text x="60" y="419" font-family="Arial" font-size="11">Both writes in flight simultaneously → conflict detected during replication</text>
  <line x1="400" y1="435" x2="400" y2="465" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LWW Solution -->
  <rect x="40" y="465" width="720" height="100" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="489" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">✅ Default Resolution: Last Writer Wins (LWW)</text>
  <text x="60" y="510" font-family="Arial" font-size="11">• DynamoDB appends a hidden system timestamp to every write automatically</text>
  <text x="60" y="528" font-family="Arial" font-size="11">• On conflict: write with LATEST timestamp wins — US (10:00:02.200) wins over India (10:00:01.100)</text>
  <text x="60" y="546" font-family="Arial" font-size="11">• Result: name = "Pradeep R" is the final value in ALL regions</text>
  <line x1="400" y1="565" x2="400" y2="595" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Alternate Solutions -->
  <rect x="40" y="595" width="720" height="150" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="400" y="619" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Alternate Conflict Prevention Strategies</text>
  <text x="60" y="640" font-family="Arial" font-size="12" font-weight="bold">Option 1: Active-Passive (Avoid conflict)</text>
  <text x="60" y="658" font-family="Arial" font-size="11">  Only 1 region writes → others are read-only replicas. No conflict possible.</text>
  <text x="60" y="680" font-family="Arial" font-size="12" font-weight="bold">Option 2: Versioning (Reject stale updates)</text>
  <text x="60" y="698" font-family="Arial" font-size="11">  Add version attribute → ConditionExpression: version = :expected → reject outdated writes</text>
  <text x="60" y="720" font-family="Arial" font-size="12" font-weight="bold">Option 3: Custom Conflict Handling</text>
  <text x="60" y="738" font-family="Arial" font-size="11">  Store both conflicting versions → resolve in application logic (e.g., merge strategy)</text>

  <!-- Summary -->
  <rect x="40" y="775" width="720" height="100" fill="#f9f9f9" stroke="#ddd"/>
  <text x="60" y="797" font-family="Arial" font-size="12" font-weight="bold">Key Takeaways:</text>
  <text x="60" y="817" font-family="Arial" font-size="11">• Default LWW is automatic — no app code needed for basic conflict resolution</text>
  <text x="60" y="835" font-family="Arial" font-size="11">• For financial or critical data → use versioning + ConditionExpression to prevent stale overwrites</text>
  <text x="60" y="853" font-family="Arial" font-size="11">• Global Tables: ideal RTO ≈ 0 (instant failover), RPO ≈ seconds (replication lag)</text>
  <text x="60" y="871" font-family="Arial" font-size="11">• Define your write region strategy BEFORE going multi-region — harder to change later</text>
</svg>
