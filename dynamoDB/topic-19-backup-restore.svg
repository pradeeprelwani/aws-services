<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">19. Backup &amp; Restore: PITR vs On-Demand</text>
  
  <!-- Main Database -->
  <rect x="300" y="80" width="200" height="80" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Live Table</text>

  <!-- On-Demand Snapshot -->
  <rect x="50" y="250" width="300" height="150" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="200" y="280" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">On-Demand Snapshot</text>
  <text x="200" y="310" text-anchor="middle" font-family="Arial" font-size="11">- Manual / Scheduled trigger</text>
  <text x="200" y="330" text-anchor="middle" font-family="Arial" font-size="11">- Long-term archiving</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial" font-size="11">- No performance impact</text>
  <line x1="350" y1="160" x2="200" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PITR Continuous -->
  <rect x="450" y="250" width="300" height="150" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="600" y="280" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">PITR (Continuous)</text>
  <text x="600" y="310" text-anchor="middle" font-family="Arial" font-size="11">- Continuous change capture</text>
  <text x="600" y="330" text-anchor="middle" font-family="Arial" font-size="11">- 35-day rolling window</text>
  <text x="600" y="350" text-anchor="middle" font-family="Arial" font-size="11">- Restore to any SECOND</text>
  <line x1="450" y1="160" x2="600" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Restore Process -->
  <path d="M400,450 L580,520 L400,590 L220,460 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="520" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Restore Engine</text>
  <line x1="200" y1="400" x2="330" y2="520" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="400" x2="470" y2="520" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="300" y="650" width="200" height="80" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="400" y="695" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">New Restored Table</text>
  <line x1="400" y1="610" x2="400" y2="650" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="100" y="750" width="600" height="80" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="775" font-family="Arial" font-size="12" font-weight="bold">Recovery Goals:</text>
  <text x="120" y="800" font-family="Arial" font-size="11">- PITR: Guard against human error / software bugs.</text>
  <text x="450" y="800" font-family="Arial" font-size="11">- On-Demand: Compliance / Audits.</text>
</svg>