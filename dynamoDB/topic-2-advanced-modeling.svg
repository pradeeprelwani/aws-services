<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">2. Advanced Data Modeling (Single-Table Design)</text>

  <!-- Application Request -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Complex Access Pattern</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(Query User + Recent Orders)</text>

  <!-- Request Router / GAC -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Partition Key Router</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">GSI Overloading Logic</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Denormalization Engine -->
  <rect x="300" y="350" width="200" height="70" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Denormalization Engine</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="11">Flatten Entities into Item Collections</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Logical Table Group -->
  <rect x="40" y="460" width="720" height="320" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="480" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Single Table Item Collection</text>

  <!-- Single Table Items -->
  <rect x="70" y="510" width="210" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="175" y="545" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">PK: USER#123</text>
  <text x="175" y="565" text-anchor="middle" font-family="Arial" font-size="11">SK: METADATA (Profile Info)</text>

  <rect x="295" y="510" width="210" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="400" y="545" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">PK: USER#123</text>
  <text x="400" y="565" text-anchor="middle" font-family="Arial" font-size="11">SK: ORDER#2024-01</text>

  <rect x="520" y="510" width="210" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="625" y="545" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">PK: USER#123</text>
  <text x="625" y="565" text-anchor="middle" font-family="Arial" font-size="11">SK: ORDER#2024-02</text>

  <!-- GSI Flip -->
  <polygon points="250,650 550,650 520,750 220,750" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="385" y="690" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Adjacency List (GSI Flip)</text>
  <text x="385" y="710" text-anchor="middle" font-family="Arial" font-size="11">Query N:M Relationships</text>
  <line x1="400" y1="590" x2="400" y2="650" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">Modeling Goals:</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- Single Round Trip</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- No JOINs at runtime</text>
</svg>