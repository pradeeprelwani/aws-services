<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">9. Zero-Downtime Migration &amp; Drift Check</text>
  
  <!-- Application -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Main Application</text>

  <!-- Dual Write Router -->
  <path d="M400,180 L550,250 L400,320 L250,250 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
  <text x="400" y="250" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Dual Write Router</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DB Pair -->
  <rect x="150" y="400" width="200" height="100" rx="5" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="250" y="455" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Source SQL DB</text>

  <rect x="450" y="400" width="200" height="100" rx="5" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="550" y="455" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Target DynamoDB</text>

  <line x1="325" y1="320" x2="250" y2="400" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="475" y1="320" x2="550" y2="400" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Drift Check -->
  <rect x="40" y="580" width="720" height="200" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="600" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Dark Reading / Comparison Script</text>

  <rect x="300" y="630" width="200" height="80" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="665" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Comparison Logic</text>
  <text x="400" y="685" text-anchor="middle" font-family="Arial" font-size="11">Detect Version Drift</text>

  <path d="M250,500 L250,630 L300,670" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <path d="M550,500 L550,630 L500,670" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="630" width="180" height="80" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="650" font-family="Arial" font-size="11" font-weight="bold">Migration Steps:</text>
  <text x="590" y="665" font-family="Arial" font-size="10">1. Start Dual Writes</text>
  <text x="590" y="675" font-family="Arial" font-size="10">2. Backfill History</text>
  <text x="590" y="685" font-family="Arial" font-size="10">3. Verify with Drift Check</text>
  <text x="590" y="695" font-family="Arial" font-size="10">4. Cutover (Switch Read)</text>
</svg>