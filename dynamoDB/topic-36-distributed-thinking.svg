<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">36. Distributed System Thinking</text>

  <!-- Intro -->
  <rect x="40" y="60" width="720" height="75" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="84" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">DynamoDB is NOT a traditional database — it's a distributed system</text>
  <text x="60" y="105" font-family="Arial" font-size="11">• Runs across thousands of servers in multiple data centers (AZs) simultaneously</text>
  <text x="60" y="122" font-family="Arial" font-size="11">• Data is automatically sharded and replicated — this is what gives it scale and availability</text>
  <line x1="400" y1="135" x2="400" y2="165" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Principle 1: Design for Failure -->
  <rect x="40" y="165" width="720" height="195" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="189" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Principle 1: Design for Failure</text>
  <text x="60" y="210" font-family="Arial" font-size="11" font-weight="bold">In distributed systems, partial failures are NORMAL — not exceptional events</text>
  <text x="60" y="230" font-family="Arial" font-size="11">• A server can go down | A network packet can drop | A request can timeout at any moment</text>
  <text x="60" y="248" font-family="Arial" font-size="11">• Never assume a request will succeed on the first attempt — always write defensive code</text>
  <text x="60" y="275" font-family="Arial" font-size="11" font-weight="bold">Retry with Exponential Backoff + Jitter:</text>
  <!-- Flow diagram for retry -->
  <rect x="80" y="285" width="150" height="35" rx="4" fill="#fff" stroke="#b85450" stroke-width="1.5"/>
  <text x="155" y="307" text-anchor="middle" font-family="Arial" font-size="11">Request Fails</text>
  <line x1="230" y1="303" x2="265" y2="303" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="265" y="285" width="150" height="35" rx="4" fill="#fff" stroke="#d6b656" stroke-width="1.5"/>
  <text x="340" y="307" text-anchor="middle" font-family="Arial" font-size="11">Wait 1s + jitter</text>
  <line x1="415" y1="303" x2="450" y2="303" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="450" y="285" width="150" height="35" rx="4" fill="#fff" stroke="#d6b656" stroke-width="1.5"/>
  <text x="525" y="307" text-anchor="middle" font-family="Arial" font-size="11">Wait 2s + jitter</text>
  <line x1="600" y1="303" x2="635" y2="303" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="635" y="285" width="100" height="35" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="685" y="307" text-anchor="middle" font-family="Arial" font-size="11">Success ✔</text>
  <text x="60" y="340" font-family="Arial" font-size="11">• Jitter: adds random delay (1.1s, 1.8s, 2.3s...) to prevent "thundering herd" (all retrying at once)</text>
  <text x="60" y="358" font-family="Arial" font-size="11">• Good news: AWS SDK v3 has retry logic built-in (default 3 attempts with backoff)</text>
  <line x1="400" y1="360" x2="400" y2="390" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Principle 2: Eventual Consistency -->
  <rect x="40" y="390" width="720" height="160" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="414" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Principle 2: Embrace Eventual Consistency</text>
  <text x="60" y="435" font-family="Arial" font-size="11">• DynamoDB replicates data across 3 AZs — replication takes milliseconds</text>
  <text x="60" y="453" font-family="Arial" font-size="11">• Eventually Consistent Read: may see slightly stale data but fastest + cheapest (0.5 RCU/4KB)</text>
  <text x="60" y="471" font-family="Arial" font-size="11">• Strongly Consistent Read: always latest data (reads Leader node) but 2x RCU cost</text>
  <!-- Diagram -->
  <rect x="60" y="483" width="155" height="45" rx="4" fill="#fff" stroke="#82b366" stroke-width="1.5"/>
  <text x="138" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">Write (Leader)</text>
  <text x="138" y="520" text-anchor="middle" font-family="Arial" font-size="11">AZ-1 updated ✔</text>
  <line x1="215" y1="505" x2="250" y2="505" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="250" y="483" width="155" height="45" rx="4" fill="#fff" stroke="#d6b656" stroke-width="1.5"/>
  <text x="328" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">Read (Follower)</text>
  <text x="328" y="520" text-anchor="middle" font-family="Arial" font-size="11">AZ-2 (may lag ms)</text>
  <text x="420" y="510" text-anchor="middle" font-family="Arial" font-size="13">→</text>
  <rect x="440" y="483" width="295" height="45" rx="4" fill="#e8f5e9" stroke="#82b366" stroke-width="1.5"/>
  <text x="588" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">Expert Advice:</text>
  <text x="588" y="520" text-anchor="middle" font-family="Arial" font-size="11">Use SC reads only for financial locks</text>
  <text x="60" y="543" font-family="Arial" font-size="11">• Default: use eventual consistency (higher availability + lower cost) for 95% of use cases</text>
  <line x1="400" y1="550" x2="400" y2="580" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Principle 3: Throughput Focus -->
  <rect x="40" y="580" width="720" height="140" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="400" y="604" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Principle 3: Focus on Throughput (RCU/WCU Efficiency)</text>
  <text x="60" y="625" font-family="Arial" font-size="11">• DynamoDB charges per RCU/WCU consumed — success is measured by efficiency</text>
  <text x="60" y="643" font-family="Arial" font-size="11">• Bad schema → wastes RCUs on unnecessary data | Good schema → reads only what's needed</text>
  <text x="60" y="661" font-family="Arial" font-size="11">• Key metrics: ConsumedReadCapacity, ThrottledRequests, SuccessfulRequestLatency</text>
  <text x="60" y="679" font-family="Arial" font-size="11">• Design schema to minimize RCU: small items, Query over Scan, ProjectionExpression</text>
  <text x="60" y="697" font-family="Arial" font-size="11">• Design schema to minimize WCU: fewer GSIs, batch writes, avoid unnecessary UpdateItem calls</text>
  <text x="60" y="715" font-family="Arial" font-size="11">• Monitor with CloudWatch → set alarms at 80% consumed capacity → auto-scale before throttling</text>
  <line x1="400" y1="720" x2="400" y2="750" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Summary -->
  <rect x="40" y="750" width="720" height="120" fill="#f9f9f9" stroke="#ddd" rx="8"/>
  <text x="60" y="774" font-family="Arial" font-size="12" font-weight="bold">The 3 Pillars of Distributed System Thinking in DynamoDB:</text>
  <text x="60" y="795" font-family="Arial" font-size="11">1. Design for Failure — Every request can fail. Build retry logic. Never assume success.</text>
  <text x="60" y="815" font-family="Arial" font-size="11">2. Embrace Eventual Consistency — Use it by default. Reserve strong consistency for critical paths only.</text>
  <text x="60" y="835" font-family="Arial" font-size="11">3. Focus on Throughput — Your schema IS your performance. Model for access patterns, not entities.</text>
  <text x="60" y="860" font-family="Arial" font-size="11" fill="#9673a6" font-weight="bold">DynamoDB mastery = distributed systems mastery applied to a managed database service.</text>
</svg>
