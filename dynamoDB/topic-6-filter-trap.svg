<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">6. The Filter Expression Efficiency Trap</text>
  
  <!-- API Request -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">API Query Request</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(Filter: status = 'DELIVERED')</text>

  <!-- Request Router -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Request Router</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">KeyCondition Check</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Disk Storage -->
  <rect x="40" y="350" width="720" height="200" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Storage Layer (Disk Read)</text>

  <rect x="300" y="390" width="200" height="70" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="420" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Read 1MB Page</text>
  <text x="400" y="435" text-anchor="middle" font-family="Arial" font-size="11">ScannedCount = 100 Items</text>
  <line x1="400" y1="320" x2="400" y2="390" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Post-Read Filter -->
  <rect x="300" y="580" width="200" height="80" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="615" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Filter in Memory</text>
  <text x="400" y="635" text-anchor="middle" font-family="Arial" font-size="11">Evaluates status == 'DELIVERED'</text>
  <line x1="400" y1="460" x2="400" y2="580" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Final Output -->
  <rect x="300" y="720" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="745" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Response Payload</text>
  <text x="400" y="762" text-anchor="middle" font-family="Arial" font-size="11">Count = 1 Item</text>
  <line x1="400" y1="660" x2="400" y2="720" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cost Legend -->
  <rect x="580" y="580" width="180" height="80" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="600" font-family="Arial" font-size="11" font-weight="bold">Efficiency Warning:</text>
  <text x="590" y="615" font-family="Arial" font-size="11" fill="#b85450">- Billed for 100 RCU</text>
  <text x="590" y="630" font-family="Arial" font-size="11">- Disk I/O is expensive</text>
  <text x="590" y="645" font-family="Arial" font-size="11">- Move filters to SK/GSI</text>
</svg>