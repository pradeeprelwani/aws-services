<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff5f5"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">6. Filter Expression Efficiency Internal Flow</text>

  <!-- Query Request -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Query + FilterExpression</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(Find 'DELIVERED' status)</text>

  <!-- Storage Read Stage (Critical Step) -->
  <rect x="250" y="180" width="300" height="120" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="210" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Stage 1: Storage Engine Read</text>
  <text x="400" y="235" text-anchor="middle" font-family="Arial" font-size="11">Reads all 100 items from B-Tree</text>
  <text x="400" y="260" text-anchor="middle" font-family="Arial" font-size="12" fill="#d9534f" font-weight="bold">💸 COST: 100 RCU Metered Here</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Memory Filtering Stage -->
  <path d="M400,340 L580,410 L400,480 L220,350 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="410" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Stage 2: In-Memory Filter</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial" font-size="11">Evaluate FilterExpression</text>
  <line x1="400" y1="300" x2="400" y2="360" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Discarded Data Container -->
  <rect x="40" y="520" width="720" height="260" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="540" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Result Processing Layer</text>

  <!-- Valid Result -->
  <rect x="70" y="570" width="200" height="100" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="170" y="610" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Returned Item (1)</text>
  <text x="170" y="630" text-anchor="middle" font-family="Arial" font-size="11">Sent back to Client</text>

  <!-- The "Trash" / Discarded -->
  <rect x="295" y="570" width="435" height="100" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="512" y="610" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Discarded Items (99)</text>
  <text x="512" y="630" text-anchor="middle" font-family="Arial" font-size="11">Already Paid For - Thrown Away</text>

  <!-- Connection to Result -->
  <line x1="400" y1="500" x2="170" y2="570" stroke="#000" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="400" y1="500" x2="512" y2="570" stroke="#000" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Correct Path Strategy -->
  <polygon points="250,700 550,700 520,780 220,780" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="385" y="730" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Optimization Solution</text>
  <text x="385" y="750" text-anchor="middle" font-family="Arial" font-size="11">Move Status to Sort Key (SK) or create GSI</text>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">The Golden Rule:</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- Filter is NOT Query</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- Metering happens FIRST</text>
</svg>