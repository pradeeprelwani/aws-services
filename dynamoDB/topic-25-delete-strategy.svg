<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">25. Large-Scale Delete Strategy</text>

  <!-- Start: Delete Request -->
  <rect x="280" y="70" width="240" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Delete Request</text>
  <text x="400" y="114" text-anchor="middle" font-family="Arial" font-size="11">(e.g., Delete ALL "INACTIVE" records)</text>
  <line x1="400" y1="130" x2="400" y2="160" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Table Small? -->
  <polygon points="400,160 560,220 400,280 240,220" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="400" y="215" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Deleting ALL or</text>
  <text x="400" y="233" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">MOST records?</text>

  <!-- Yes path: Recreate table -->
  <line x1="560" y1="220" x2="660" y2="220" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="605" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#b85450">YES</text>
  <rect x="660" y="190" width="110" height="60" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="715" y="215" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Drop &amp; Recreate</text>
  <text x="715" y="230" text-anchor="middle" font-family="Arial" font-size="11">Table (Fastest)</text>

  <!-- No path: BatchWriteItem -->
  <line x1="400" y1="280" x2="400" y2="320" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="414" y="310" font-family="Arial" font-size="11" fill="#666">NO</text>

  <!-- Step 1: Scan in Batches -->
  <rect x="130" y="320" width="540" height="60" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Step 1: Scan / Query in Segments</text>
  <text x="400" y="362" text-anchor="middle" font-family="Arial" font-size="11">Split table into parallel segments (use Segment &amp; TotalSegments)</text>
  <line x1="400" y1="380" x2="400" y2="410" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Parallel Workers -->
  <rect x="40" y="410" width="720" height="170" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Step 2: Parallel Workers (BatchWriteItem — max 25 items/call)</text>

  <rect x="60" y="445" width="190" height="115" fill="#e1d5e7" stroke="#9673a6" stroke-width="2" rx="6"/>
  <text x="155" y="468" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Worker 1</text>
  <text x="155" y="486" text-anchor="middle" font-family="Arial" font-size="11">Batch 1–1000</text>
  <text x="155" y="503" text-anchor="middle" font-family="Arial" font-size="11">25 items/call</text>
  <text x="155" y="520" text-anchor="middle" font-family="Arial" font-size="11">Retry on fail</text>
  <text x="155" y="542" text-anchor="middle" font-family="Arial" font-size="11" fill="#82b366">✔ Done</text>

  <rect x="305" y="445" width="190" height="115" fill="#e1d5e7" stroke="#9673a6" stroke-width="2" rx="6"/>
  <text x="400" y="468" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Worker 2</text>
  <text x="400" y="486" text-anchor="middle" font-family="Arial" font-size="11">Batch 1001–2000</text>
  <text x="400" y="503" text-anchor="middle" font-family="Arial" font-size="11">25 items/call</text>
  <text x="400" y="520" text-anchor="middle" font-family="Arial" font-size="11">Retry on fail</text>
  <text x="400" y="542" text-anchor="middle" font-family="Arial" font-size="11" fill="#82b366">✔ Done</text>

  <rect x="550" y="445" width="190" height="115" fill="#e1d5e7" stroke="#9673a6" stroke-width="2" rx="6"/>
  <text x="645" y="468" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Worker 3</text>
  <text x="645" y="486" text-anchor="middle" font-family="Arial" font-size="11">Batch 2001–3000</text>
  <text x="645" y="503" text-anchor="middle" font-family="Arial" font-size="11">25 items/call</text>
  <text x="645" y="520" text-anchor="middle" font-family="Arial" font-size="11">Retry on fail</text>
  <text x="645" y="542" text-anchor="middle" font-family="Arial" font-size="11" fill="#82b366">✔ Done</text>

  <line x1="400" y1="580" x2="400" y2="610" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TTL Alternative -->
  <rect x="100" y="610" width="600" height="60" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="400" y="636" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Alternative: Use TTL (Zero WCU Cost)</text>
  <text x="400" y="654" text-anchor="middle" font-family="Arial" font-size="11">Set TTL attribute on items → DynamoDB auto-deletes (within 48 hrs)</text>
  <line x1="400" y1="670" x2="400" y2="700" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Key Limits Box -->
  <rect x="80" y="700" width="640" height="80" fill="#f9f9f9" stroke="#ddd"/>
  <text x="100" y="722" font-family="Arial" font-size="12" font-weight="bold">Key Limits &amp; Rules:</text>
  <text x="100" y="742" font-family="Arial" font-size="11">- BatchWriteItem: max 25 items/call, max 16 MB/call</text>
  <text x="100" y="760" font-family="Arial" font-size="11">- DynamoDB has NO bulk delete API — always iterate &amp; batch</text>
  <text x="100" y="778" font-family="Arial" font-size="11">- Drop &amp; Recreate is fastest when clearing the majority of data (no WCU cost)</text>
</svg>
