<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">15. Pagination &amp; The 1MB Limit</text>
  
  <!-- Request 1 -->
  <rect x="50" y="80" width="200" height="100" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="150" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Request 1</text>
  <text x="150" y="145" text-anchor="middle" font-family="Arial" font-size="11">Fetch all orders</text>

  <!-- 1MB Limit -->
  <rect x="350" y="100" width="100" height="60" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="135" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#b85450">1MB Limit</text>
  <line x1="250" y1="130" x2="350" y2="130" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result 1 -->
  <rect x="550" y="80" width="200" height="100" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="650" y="120" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Page 1 Data</text>
  <rect x="570" y="140" width="160" height="30" fill="#fff" opacity="0.6" />
  <text x="650" y="160" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">LastEvaluatedKey: "item_50"</text>
  <line x1="450" y1="130" x2="550" y2="130" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bookmark Loop -->
  <path d="M650,180 Q650,280 400,280 Q150,280 150,380" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Token Transfer</text>

  <!-- Request 2 -->
  <rect x="50" y="380" width="200" height="100" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="150" y="420" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Request 2</text>
  <text x="150" y="440" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">ExclusiveStartKey: "item_50"</text>

  <!-- Result 2 -->
  <rect x="550" y="380" width="200" height="100" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="650" y="425" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Page 2 Data</text>
  <text x="650" y="445" text-anchor="middle" font-family="Arial" font-size="11">No LastEvaluatedKey</text>
  <line x1="250" y1="430" x2="550" y2="430" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="460" width="60" height="20" fill="#2e7d32" opacity="0.8" />
  <text x="680" y="475" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">DONE</text>

  <!-- Legend -->
  <rect x="100" y="550" width="600" height="120" fill="#f9f9f9" stroke="#ddd" />
  <text x="120" y="575" font-family="Arial" font-size="12" font-weight="bold">Pagination Mechanics:</text>
  <text x="120" y="600" font-family="Arial" font-size="11">- Stateless iteration: Next request needs token from previous</text>
  <text x="120" y="620" font-family="Arial" font-size="11">- No "Page Number" support natively (OFFSET is SQL only)</text>
  <text x="120" y="640" font-family="Arial" font-size="11">- ScannedCount reveals filtering inefficiency across pages</text>
</svg>