<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">15. Pagination &amp; 1MB Limit Workflow</text>

  <!-- Query Request -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Initial Query Request</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(Scan or Query on PK)</text>

  <!-- 1MB Limit Guard -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">1MB Data Boundary</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">DDB stops at 1MB or ScannedItems</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pointer Logic -->
  <rect x="300" y="350" width="200" height="70" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">LastEvaluatedKey</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="11">Current Cursor Reference</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pagination States -->
  <rect x="40" y="460" width="720" height="320" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="480" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Iterative Retrieval Workflow</text>

  <!-- Page 1 -->
  <rect x="70" y="510" width="230" height="120" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="185" y="540" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Request #1 (T0)</text>
  <text x="185" y="565" font-family="Arial" font-size="11">Data: [0KB to 1024KB]</text>
  <rect x="85" y="580" width="200" height="35" fill="#fff" opacity="0.6"/>
  <text x="185" y="602" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">RES: LastEvaluatedKey != Null</text>

  <!-- App State -->
  <rect x="340" y="525" width="120" height="90" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="565" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Application</text>
  <text x="400" y="580" text-anchor="middle" font-family="Arial" font-size="10">Stores Key</text>

  <!-- Page 2 -->
  <rect x="500" y="510" width="230" height="120" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="615" y="540" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Request #2 (T1)</text>
  <text x="615" y="565" font-family="Arial" font-size="11" fill="#666">Start: ExclusiveStartKey</text>
  <rect x="515" y="580" width="200" height="35" fill="#fff" opacity="0.6"/>
  <text x="615" y="602" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">RES: LastEvaluatedKey == Null</text>

  <!-- Conclusion -->
  <polygon points="250,680 550,680 520,760 220,760" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="385" y="715" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">EOD (End of Data)</text>
  <text x="385" y="735" text-anchor="middle" font-family="Arial" font-size="11">Loop terminates, result set combined</text>

  <!-- Connection Lines -->
  <line x1="400" y1="420" x2="400" y2="460" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="570" x2="340" y2="570" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="460" y1="570" x2="500" y2="570" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">Pagination Rules:</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- Limit is post-filter</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- Max 1MB payload</text>
</svg>