<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">5. Advanced TTL &amp; Archiving Internal Flow</text>

  <!-- Expiration Event -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Timestamp Reached</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(Attribute &lt; Epoch Now)</text>

  <!-- TTL Background Service -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">TTL Background Scanner</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">Best-effort Scan (up to 48h)</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Logical Delete Logic -->
  <rect x="300" y="350" width="200" height="70" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Service Deletion</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="11">Marked for Removal (Zero WCU)</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Streaming Logic Container -->
  <rect x="40" y="460" width="720" height="320" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="480" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Archive Pipeline (CDC)</text>

  <!-- DynamoDB Stream Event -->
  <rect x="70" y="510" width="310" height="120" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="225" y="540" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">DDB Stream (REMOVE)</text>
  <text x="225" y="565" text-anchor="middle" font-family="Arial" font-size="11">userIdentity: "DynamoDB Service"</text>
  <text x="225" y="585" text-anchor="middle" font-family="Arial" font-size="11" fill="#82b366" font-weight="bold">NewImage + OldImage Captured</text>

  <!-- Lambda Archive Processor -->
  <rect x="420" y="510" width="310" height="120" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="575" y="540" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Lambda Processor</text>
  <text x="575" y="565" text-anchor="middle" font-family="Arial" font-size="11">Filter by Service Identity</text>
  <text x="575" y="585" text-anchor="middle" font-family="Arial" font-size="11">Format for Compliance</text>

  <!-- Final Archive -->
  <polygon points="250,680 550,680 520,760 220,760" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="385" y="715" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Amazon S3 (Glacier)</text>
  <text x="385" y="735" text-anchor="middle" font-family="Arial" font-size="11">Zero-cost Historical Persistence</text>

  <!-- Connections -->
  <line x1="400" y1="420" x2="400" y2="460" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="225" y1="630" x2="385" y2="680" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <line x1="575" y1="630" x2="385" y2="680" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">Pro Tip:</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- Archive is RCU free</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- Use Filter on Read</text>
</svg>