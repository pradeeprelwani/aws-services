<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">1. DynamoDB Architectural Internals</text>
  
  <!-- Request Entry -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">API Request</text>
  <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="11">(PutItem / Query / GetItem)</text>

  <!-- Request Router / GAC -->
  <path d="M400,160 L580,230 L400,300 L220,170 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="2" transform="translate(0,20)"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Request Router (GAC)</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial" font-size="11">Auth &amp; Admission Control</text>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hashing -->
  <rect x="300" y="350" width="200" height="70" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Consistent Hashing</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="11">PK -> Physical Partition Map</text>
  <line x1="400" y1="320" x2="400" y2="350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Storage Partition Group -->
  <rect x="40" y="460" width="720" height="320" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="50" y="480" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Storage Partition (Replicated)</text>

  <!-- Physical Nodes -->
  <rect x="70" y="510" width="180" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="160" y="545" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-1: Leader</text>
  <text x="160" y="565" text-anchor="middle" font-family="Arial" font-size="11">Primary for WRITES</text>

  <rect x="310" y="510" width="180" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="400" y="545" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-2: Follower</text>
  <text x="400" y="565" text-anchor="middle" font-family="Arial" font-size="11">Eventual Reads</text>

  <rect x="550" y="510" width="180" height="80" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="640" y="545" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-3: Follower</text>
  <text x="640" y="565" text-anchor="middle" font-family="Arial" font-size="11">Eventual Reads</text>

  <!-- Replication -->
  <path d="M 250 550 Q 280 520 310 550" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 490 550 Q 520 520 550 550" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B-Tree -->
  <polygon points="250,650 550,650 520,750 220,750" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="385" y="690" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">B-Tree Indexing</text>
  <text x="385" y="710" text-anchor="middle" font-family="Arial" font-size="11">Local Storage Optimization</text>
  <line x1="400" y1="590" x2="400" y2="650" stroke="#666" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Adaptive Capacity -->
  <ellipse cx="120" cy="300" rx="80" ry="40" fill="#f0a30a" stroke="#BD7000" stroke-width="2"/>
  <text x="120" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Adaptive</text>
  <text x="120" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Capacity</text>
  <path d="M 120 340 Q 120 400 120 435" fill="none" stroke="#f0a30a" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="350" width="180" height="70" fill="#f9f9f9" stroke="#ddd" />
  <text x="590" y="370" font-family="Arial" font-size="11" font-weight="bold">Throughput Limits:</text>
  <text x="590" y="385" font-family="Arial" font-size="11">- 1k WCU / sec</text>
  <text x="590" y="400" font-family="Arial" font-size="11">- 3k RCU / sec</text>
</svg>