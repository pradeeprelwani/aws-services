<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f4f4f4"/>
  <rect width="100%" height="50" fill="#232F3E"/>
  <text x="20" y="32" font-family="Arial" font-size="20" fill="#ffffff" font-weight="bold">1. DynamoDB Architectural Internals</text>

  <!-- Step 1: API Request -->
  <rect x="280" y="65" width="240" height="55" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">API Request</text>
  <text x="400" y="106" text-anchor="middle" font-family="Arial" font-size="11">(PutItem / Query / GetItem / DeleteItem)</text>
  <line x1="400" y1="120" x2="400" y2="148" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: GAC -->
  <polygon points="400,148 580,215 400,282 220,215" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="400" y="208" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Global Admission Control (GAC)</text>
  <text x="400" y="226" text-anchor="middle" font-family="Arial" font-size="11">IAM check · Table exists · Throughput limit</text>
  <line x1="400" y1="282" x2="400" y2="312" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Consistent Hashing -->
  <rect x="270" y="312" width="260" height="60" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="400" y="338" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Consistent Hashing</text>
  <text x="400" y="356" text-anchor="middle" font-family="Arial" font-size="11">PK → Hash → Physical Partition</text>
  <line x1="400" y1="372" x2="400" y2="402" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Storage Partitions -->
  <rect x="40" y="402" width="720" height="205" fill="none" stroke="#999" stroke-dasharray="5,5"/>
  <text x="55" y="422" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Physical Storage (3 AZs — replicated)</text>

  <rect x="65" y="432" width="185" height="155" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="6"/>
  <text x="158" y="455" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-1: Leader</text>
  <text x="158" y="473" text-anchor="middle" font-family="Arial" font-size="11">Handles ALL WRITES</text>
  <text x="158" y="491" text-anchor="middle" font-family="Arial" font-size="11">Strong Reads → here</text>
  <text x="158" y="515" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Limits:</text>
  <text x="158" y="531" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">1,000 WCU/sec</text>
  <text x="158" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">3,000 RCU/sec</text>
  <text x="158" y="563" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">10 GB max / partition</text>

  <rect x="308" y="432" width="185" height="100" fill="#f5f5f5" stroke="#666" stroke-width="2" rx="6"/>
  <text x="400" y="455" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-2: Follower</text>
  <text x="400" y="473" text-anchor="middle" font-family="Arial" font-size="11">Eventual Reads</text>
  <text x="400" y="491" text-anchor="middle" font-family="Arial" font-size="11">Async replication</text>

  <rect x="551" y="432" width="185" height="100" fill="#f5f5f5" stroke="#666" stroke-width="2" rx="6"/>
  <text x="644" y="455" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">AZ-3: Follower</text>
  <text x="644" y="473" text-anchor="middle" font-family="Arial" font-size="11">Eventual Reads</text>
  <text x="644" y="491" text-anchor="middle" font-family="Arial" font-size="11">Async replication</text>

  <path d="M 250 490 Q 275 465 308 490" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 493 490 Q 518 465 551 490" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B-Tree + Adaptive Capacity -->
  <rect x="40" y="622" width="340" height="80" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="210" y="648" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">B-Tree Indexing (Sort Key)</text>
  <text x="60" y="668" font-family="Arial" font-size="11">SK stored in B-Tree within each partition</text>
  <text x="60" y="684" font-family="Arial" font-size="11">Enables: begins_with · between · &gt; · &lt; operators</text>

  <rect x="420" y="622" width="340" height="80" rx="8" fill="#FFD580" stroke="#c77700" stroke-width="2"/>
  <text x="590" y="648" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Adaptive Capacity</text>
  <text x="440" y="668" font-family="Arial" font-size="11">Hot partition → auto-shifts throughput budget</text>
  <text x="440" y="684" font-family="Arial" font-size="11">Burst buffer: unused 5-min capacity bank</text>

  <!-- Summary -->
  <rect x="40" y="718" width="720" height="175" fill="#232F3E" rx="8"/>
  <text x="60" y="741" font-family="Arial" font-size="12" font-weight="bold" fill="#FF9900">Key Takeaways:</text>
  <text x="60" y="761" font-family="Arial" font-size="11" fill="#fff">• GAC is the first gate — throttling here protects storage nodes from being flooded</text>
  <text x="60" y="779" font-family="Arial" font-size="11" fill="#fff">• Same PK always hashes to same physical partition — predictable, fast routing</text>
  <text x="60" y="797" font-family="Arial" font-size="11" fill="#fff">• 3-copy replication across AZs: Leader writes, Followers serve eventual reads</text>
  <text x="60" y="815" font-family="Arial" font-size="11" fill="#fff">• Hard limits: 1,000 WCU/sec and 3,000 RCU/sec per partition, 10 GB per partition</text>
  <text x="60" y="833" font-family="Arial" font-size="11" fill="#fff">• B-Tree on Sort Key enables range queries — without SK there is no ordering</text>
  <text x="60" y="851" font-family="Arial" font-size="11" fill="#fff">• Adaptive Capacity is automatic — handles hot partitions without app changes</text>
  <text x="60" y="869" font-family="Arial" font-size="11" fill="#fff">• High-cardinality PK = data spread evenly = better throughput utilization</text>
</svg>